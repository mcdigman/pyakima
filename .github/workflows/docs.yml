name: Docs

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

# All jobs only read the repo; none need a writable GITHUB_TOKEN, so pin the
# default token to read-only.
permissions:
  contents: read

jobs:
  html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: "3.14"
          cache-dependency-glob: "**/pyproject.toml"

      # `uv run --extra docs` syncs the project (pulling numpy/numba so autodoc
      # can import pyakima) plus the docs extra, then builds. -W turns warnings
      # into errors so broken references or stale docstrings fail CI.
      - name: Build HTML docs
        run: >
          uv run --extra docs
          sphinx-build -W --keep-going -b html docs docs/_build/html

      - name: Upload HTML docs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: html-docs
          path: docs/_build/html
          if-no-files-found: error
