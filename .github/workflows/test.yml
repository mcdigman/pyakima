name: Test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: "**/pyproject.toml"

      # Install the project with its dev extra into a venv so the tests run
      # against the real installed package (the runner's system Python is
      # externally managed, so --system installs are rejected). numpy/numba come
      # in via the project's own dependencies; pytest comes from the [dev] extra.
      - name: Install project with test extras
        run: |
          uv venv
          uv pip install ".[dev]"

      # Placeholder: there are no tests in tests/ yet. pytest exits with code 5
      # ("no tests collected"), which we treat as a pass so this workflow is
      # ready to go green the moment the first test lands. Remove the special
      # casing once tests exist.
      - name: Run tests
        run: |
          set +e
          .venv/bin/python -m pytest
          status=$?
          if [ "$status" -eq 5 ]; then
            echo "::warning::No tests collected yet -- test workflow is a placeholder."
            exit 0
          fi
          exit "$status"
