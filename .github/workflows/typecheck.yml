name: Type Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: typecheck-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  # mypy runs only here (it is not a prek hook; pyrefly handles type checking in
  # lint.yml). Keep in sync with the mypy version in the [dev] extra.
  MYPY_VERSION: "2.1.0"
  # Must be new enough to understand the Python 3.14 stdlib: the job runs under
  # 3.14 (PYTHON_VERSION), whose stdlib uses t-strings (string/templatelib.py).
  # pyright <= 1.1.406 lacks a stub for it and parse-errors on that source under
  # pythonVersion = "3.10"; 1.1.410+ ships the 3.14 typeshed and passes.
  PYRIGHT_VERSION: "1.1.410"

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: "**/pyproject.toml"

      # Install the project with its dev extra into a venv so mypy resolves the
      # real numpy/numba types (the runner's system Python is externally managed,
      # so --system installs are rejected). This matches the pyright job and keeps
      # CI in step with local runs; strict mode's disallow-untyped-decorators only
      # stays quiet when numba/pytest resolve to real types rather than Any. scipy
      # and matplotlib are added so demos/step_demo.py imports resolve; the other
      # demo backend, pygsl_lite, is handled by the ignore_missing_imports
      # override in [tool.mypy] (pyproject.toml) since it is not installable here.
      - name: Install project with typed extras
        run: |
          uv venv
          uv pip install ".[dev]" scipy matplotlib

      # Point mypy at the venv interpreter so it sees the installed deps. No
      # --ignore-missing-imports: imports resolve for real (pygsl_lite is only
      # imported dynamically via importlib, so mypy never flags it).
      - name: Run mypy
        run: >
          uvx --from "mypy==${{ env.MYPY_VERSION }}" mypy
          --python-executable .venv/bin/python
          --explicit-package-bases
          .

  pyright:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: "**/pyproject.toml"

      # Unlike the mypy job (which uses --ignore-missing-imports), pyright
      # resolves types from the installed environment, so install the project
      # with its dev extra into a venv (the runner's system Python is externally
      # managed, so --system installs are rejected). numba ships no py.typed, so
      # its missing-import reports are silenced via reportMissingImports = "none"
      # in [tool.pyright] (see pyproject.toml).
      - name: Install project with typed extras
        run: |
          uv venv
          uv pip install ".[dev]"

      - name: Run pyright
        run: >
          uvx pyright@${{ env.PYRIGHT_VERSION }}
          --pythonpath .venv/bin/python
