name: Dead Code

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: deadcode-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"

jobs:
  skylos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: "**/pyproject.toml"

      # Dead-code / unreachable-symbol detection. Run unpinned (like the other
      # uvx-based checks) so CI tracks the current release. False positives are
      # suppressed inline with `# skylos: ignore[...]` comments in the source.
      - name: Run skylos
        run: uvx skylos pyakima tests
