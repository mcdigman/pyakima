name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

# All jobs only read the repo; none need a writable GITHUB_TOKEN, so pin the
# default token to read-only.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: "3.14"
          cache-dependency-glob: "**/pyproject.toml"

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  install:
    # Confirm the package installs and imports both at the declared dependency
    # floors (oldest Python + lowest-direct resolution -> numpy 1.22 / numba
    # 0.56) and against the latest releases (modern Python + highest resolution).
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.10"
            resolution: lowest-direct
          - python-version: "3.14"
            resolution: highest
    name: install (py${{ matrix.python-version }}, ${{ matrix.resolution }})
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install project (${{ matrix.resolution }} resolution)
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install --resolution ${{ matrix.resolution }} .

      - name: Import check
        run: .venv/bin/python -c "import pyakima; from pyakima import AkimaSpline; print(pyakima.__file__)"
