name: Docstrings

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docstrings-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  # Keep in sync with the pydoclint version used locally.
  PYDOCLINT_VERSION: "0.8.7"

# All jobs only read the repo; none need a writable GITHUB_TOKEN, so pin the
# default token to read-only.
permissions:
  contents: read

jobs:
  pydoclint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: "**/pyproject.toml"

      # numpy-style docstring/signature linting. Options (including the exclude
      # list that keeps the pyakima.demos example subpackage out of docstring
      # linting) come from [tool.pydoclint] in pyproject.toml.
      - name: Run pydoclint
        run: >
          uvx "pydoclint@${{ env.PYDOCLINT_VERSION }}"
          pyakima
