name: Docstrings

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docstrings-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.14"
  # Keep in sync with the pydoclint version used locally.
  PYDOCLINT_VERSION: "0.8.7"

jobs:
  pydoclint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          python-version: ${{ env.PYTHON_VERSION }}
          cache-dependency-glob: "**/pyproject.toml"

      # numpy-style docstring/signature linting. Options (including the exclude
      # list that keeps the pyakima.demos example subpackage out of docstring
      # linting) come from [tool.pydoclint] in pyproject.toml.
      - name: Run pydoclint
        run: >
          uvx "pydoclint@${{ env.PYDOCLINT_VERSION }}"
          pyakima
